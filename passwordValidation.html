<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Validation</title>
</head>
<body>
    <h3>Password Pattern</h3>
    <form>
        <label for="bp">Basic Password</label>
        <input type="text" id="bp" name="pwd1" pattern="^.{8,}$">
        <br>
        <label for="pol">Pattern Without Lookaheads</label>
        <input type="text" id="pol" name="pwd2" pattern="^[A-Za-z\d@#$%^&*]{8,}$">
        <br>
        <label for="pwuld">Password With Uppercase, Lowercase & digits</label>
        <input type="text" id="pwuld" name="pwd3" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[A-Za-z\d]{8,}$">
        <br>
        <label for="spv">Strong Password Validation</label>
        <input type="text" id="spv" name="pwd4" pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{12,}$">
        <br>
        <label for="cpfpv">Customizable Pattern for Password Validation</label>
        <input type="text" id="cpfpv" name="pwd5" pattern="^(?=(.*\d){2,})(?=(.*[A-Z]){2,})(?=.*[!@#$%^&*])[\dA-Z!@#$%^&*]{10,}$">
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Cancel</button>
</body>
</html>
